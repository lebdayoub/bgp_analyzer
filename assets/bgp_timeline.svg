<svg width="680" height="190" viewBox="0 0 680 190" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .mono { font-family:'Courier New',monospace; }
      .b1 { animation:sl 0.5s ease 0.1s both; }
      .b2 { animation:sl 0.5s ease 0.2s both; }
      .b3 { animation:sl 0.5s ease 0.3s both; }
      .b4 { animation:sl 0.5s ease 0.4s both; }
      .b5 { animation:sl 0.5s ease 0.5s both; }
      .b6 { animation:sl 0.5s ease 0.6s both; }
      .b7 { animation:sl 0.5s ease 0.7s both; }
      .b8 { animation:sl 0.5s ease 0.8s both; }
      .b9 { animation:sl 0.5s ease 0.9s both; }
      @keyframes sl { from{opacity:0;transform:translateX(-14px)} to{opacity:1;transform:translateX(0)} }
    </style>
  </defs>
  <rect width="680" height="190" fill="#0d1117" rx="8" stroke="#21262d" stroke-width="1"/>
  <text x="22" y="26" class="mono" font-size="11" fill="#6e7681">BGP prefix timeline — AS206349 / 185.215.113.0/24</text>

  <!-- axis -->
  <line x1="30" y1="148" x2="650" y2="148" stroke="#30363d" stroke-width="1"/>
  <text x="30"  y="164" class="mono" font-size="9" fill="#6e7681">Jan</text>
  <text x="155" y="164" class="mono" font-size="9" fill="#6e7681">Mar</text>
  <text x="285" y="164" class="mono" font-size="9" fill="#6e7681">May</text>
  <text x="415" y="164" class="mono" font-size="9" fill="#6e7681">Jul</text>
  <text x="540" y="164" class="mono" font-size="9" fill="#6e7681">Sep</text>

  <!-- bars -->
  <rect x="40"  y="66" width="95" height="16" fill="#3fb950" opacity="0.85" rx="3" class="b1"/>
  <rect x="145" y="66" width="14" height="16" fill="#f78166" opacity="0.9"  rx="3" class="b2"/>
  <rect x="172" y="66" width="72" height="16" fill="#3fb950" opacity="0.85" rx="3" class="b3"/>
  <rect x="254" y="66" width="12" height="16" fill="#f78166" opacity="0.9"  rx="3" class="b4"/>
  <rect x="278" y="66" width="42" height="16" fill="#3fb950" opacity="0.85" rx="3" class="b5"/>
  <rect x="330" y="66" width="10" height="16" fill="#f78166" opacity="0.9"  rx="3" class="b6"/>
  <rect x="352" y="66" width="28" height="16" fill="#3fb950" opacity="0.85" rx="3" class="b7"/>
  <rect x="390" y="66" width="10" height="16" fill="#f78166" opacity="0.9"  rx="3" class="b8"/>

  <!-- MOAS zone -->
  <rect x="415" y="55" width="90" height="28" fill="#ff8c00" opacity="0.08" rx="3"/>
  <text x="460" y="70" text-anchor="middle" class="mono" font-size="9" fill="#ff8c00">MOAS detected</text>
  <rect x="415" y="66" width="90" height="16" fill="#ff8c00" opacity="0.65" rx="3" class="b9"/>

  <rect x="520" y="66" width="65" height="16" fill="#3fb950" opacity="0.85" rx="3" class="b9"/>

  <!-- legend -->
  <rect x="30"  y="108" width="12" height="9" fill="#3fb950" rx="2"/>
  <text x="46"  y="117" class="mono" font-size="9" fill="#8b949e">Announced</text>
  <rect x="140" y="108" width="12" height="9" fill="#f78166" rx="2"/>
  <text x="156" y="117" class="mono" font-size="9" fill="#8b949e">Withdrawn</text>
  <rect x="250" y="108" width="12" height="9" fill="#ff8c00" rx="2"/>
  <text x="266" y="117" class="mono" font-size="9" fill="#8b949e">MOAS / origin conflict</text>
</svg>
