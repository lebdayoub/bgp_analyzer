<svg width="560" height="210" viewBox="0 0 560 210" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .mono { font-family:'Courier New',monospace; }
      .nd { animation:fl 3s ease-in-out infinite; }
      @keyframes fl { 0%,100%{transform:translateY(0px)} 50%{transform:translateY(-5px)} }
      .edash { stroke-dasharray:4,3; animation:mv 1.4s linear infinite; }
      @keyframes mv { to { stroke-dashoffset:-14; } }
    </style>
    <marker id="ar" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#58a6ff" opacity="0.6"/>
    </marker>
    <marker id="ar2" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#ff4444" opacity="0.7"/>
    </marker>
  </defs>
  <rect width="560" height="210" fill="#0d1117" rx="8" stroke="#21262d" stroke-width="1"/>
  <text x="280" y="22" text-anchor="middle" class="mono" font-size="10" fill="#6e7681">D3.js graph output — example cluster</text>

  <!-- edges -->
  <line x1="280" y1="95" x2="155" y2="130" stroke="#58a6ff" stroke-width="1.2" opacity="0.45" marker-end="url(#ar)" class="edash"/>
  <line x1="280" y1="95" x2="215" y2="158" stroke="#58a6ff" stroke-width="1.2" opacity="0.45" marker-end="url(#ar)" class="edash" style="animation-delay:-0.3s"/>
  <line x1="280" y1="95" x2="340" y2="158" stroke="#44cc44" stroke-width="1.2" opacity="0.45" marker-end="url(#ar)" class="edash" style="animation-delay:-0.6s"/>
  <line x1="280" y1="95" x2="410" y2="128" stroke="#ff8c00" stroke-width="1.2" opacity="0.5"  marker-end="url(#ar)" class="edash" style="animation-delay:-0.9s"/>
  <line x1="280" y1="95" x2="330" y2="58"  stroke="#ff8c00" stroke-width="1.2" opacity="0.4"  marker-end="url(#ar)" class="edash" style="animation-delay:-1.2s"/>
  <line x1="155" y1="130" x2="110" y2="168" stroke="#58a6ff" stroke-width="1" opacity="0.3" marker-end="url(#ar)" class="edash" style="animation-delay:-0.4s"/>
  <line x1="410" y1="128" x2="460" y2="168" stroke="#ff4444" stroke-width="1.5" opacity="0.6" marker-end="url(#ar2)" class="edash" style="animation-delay:-0.7s"/>

  <!-- seed -->
  <circle cx="280" cy="95" r="15" fill="#f78166" opacity="0.95" class="nd" style="animation-delay:0s"/>
  <text x="280" y="99" text-anchor="middle" class="mono" font-size="8" fill="#0d1117" font-weight="bold">SEED</text>

  <!-- IPs -->
  <circle cx="155" cy="130" r="10" fill="#4488ff" opacity="0.85" class="nd" style="animation-delay:0.3s"/>
  <circle cx="215" cy="158" r="10" fill="#4488ff" opacity="0.85" class="nd" style="animation-delay:0.7s"/>
  <circle cx="110" cy="168" r="9"  fill="#4488ff" opacity="0.7"  class="nd" style="animation-delay:1.0s"/>

  <!-- domain -->
  <circle cx="340" cy="158" r="9" fill="#44cc44" opacity="0.85" class="nd" style="animation-delay:0.5s"/>

  <!-- CF-fronted -->
  <circle cx="330" cy="58" r="9" fill="#ff8c00" opacity="0.85" class="nd" style="animation-delay:0.8s"/>
  <text x="330" y="44" text-anchor="middle" class="mono" font-size="8" fill="#ff8c00">CF-fronted</text>

  <!-- C2 candidates -->
  <circle cx="410" cy="128" r="11" fill="#ff4444" opacity="0.9" class="nd" style="animation-delay:0.4s"/>
  <text x="410" y="148" text-anchor="middle" class="mono" font-size="8" fill="#ff4444">C2?</text>
  <circle cx="460" cy="168" r="9"  fill="#ff4444" opacity="0.8"  class="nd" style="animation-delay:0.9s"/>

  <!-- legend -->
  <circle cx="30"  cy="195" r="5" fill="#4488ff" opacity="0.85"/>
  <text x="40"  y="199" class="mono" font-size="8" fill="#8b949e">IP</text>
  <circle cx="72"  cy="195" r="5" fill="#44cc44" opacity="0.85"/>
  <text x="82"  y="199" class="mono" font-size="8" fill="#8b949e">Domain</text>
  <circle cx="135" cy="195" r="5" fill="#ff4444" opacity="0.9"/>
  <text x="145" y="199" class="mono" font-size="8" fill="#8b949e">C2 candidate</text>
  <circle cx="225" cy="195" r="5" fill="#ff8c00" opacity="0.85"/>
  <text x="235" y="199" class="mono" font-size="8" fill="#8b949e">CF-fronted</text>
  <circle cx="305" cy="195" r="5" fill="#f78166"/>
  <text x="315" y="199" class="mono" font-size="8" fill="#8b949e">Seed</text>
</svg>
